<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="100%" stop-color="#FFA751" />
    </linearGradient>

    <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="100%" stop-color="#B71C1C" />
    </linearGradient>

    <!-- Text Glow Filters -->
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Dot Grid Pattern -->
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#ffffff" fill-opacity="0.04" />
    </pattern>
  </defs>

  <style>
    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&amp;family=Outfit:wght@300;400&amp;family=Share+Tech+Mono&amp;display=swap');

    /* Keyframes */
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.55; }
    }

    @keyframes waveMove1 {
      0% { transform: translateX(0); }
      100% { transform: translateX(-900px); }
    }

    @keyframes waveMove2 {
      0% { transform: translateX(0); }
      100% { transform: translateX(900px); }
    }

    @keyframes textGlitch {
      0%, 100% { opacity: 1; }
      98% { opacity: 1; }
      99% { opacity: 0.8; }
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* CSS Classes */
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    .font-outfit { font-family: 'Outfit', sans-serif; }
    .font-mono { font-family: 'Share Tech Mono', monospace; }

    .wave-line-1 {
      animation: waveMove1 20s linear infinite;
    }
    
    .wave-line-2 {
      animation: waveMove2 25s linear infinite;
    }

    .status-dot {
      animation: pulseDot 2s infinite ease-in-out;
    }

    .glow-overlay {
      animation: pulseGlow 4s infinite ease-in-out;
    }

    .main-title {
      animation: textGlitch 8s infinite;
    }
  </style>

  <!-- Background Base -->
  <rect width="900" height="200" rx="8" fill="url(#bgGrad)" stroke="#13131b" stroke-width="1.5" />
  
  <!-- Subtle Grid Pattern -->
  <rect width="900" height="200" fill="url(#dotGrid)" rx="8" />

  <!-- Animated Neural/Signal Waves (Bottom Overlay) -->
  <g opacity="0.35">
    <!-- Wave 1 (Gold) -->
    <path class="wave-line-1" d="M 0 170 Q 225 150 450 170 T 900 170 Q 1125 150 1350 170 T 1800 170 L 1800 200 L 0 200 Z" fill="url(#goldGrad)" opacity="0.12" />
    <path class="wave-line-1" d="M 0 170 Q 225 150 450 170 T 900 170 Q 1125 150 1350 170 T 1800 170" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4" />

    <!-- Wave 2 (Crimson) -->
    <path class="wave-line-2" transform="translate(-900, 0)" d="M 0 160 Q 225 180 450 160 T 900 160 Q 1125 180 1350 160 T 1800 160 L 1800 200 L 0 200 Z" fill="url(#crimsonGrad)" opacity="0.1" />
    <path class="wave-line-2" transform="translate(-900, 0)" d="M 0 160 Q 225 180 450 160 T 900 160 Q 1125 180 1350 160 T 1800 160" stroke="url(#crimsonGrad)" stroke-width="1" opacity="0.35" />
  </g>

  <!-- Ambient Glow Behind Text -->
  <circle cx="450" cy="100" r="120" fill="#FFD700" opacity="0.04" filter="url(#glowGold)" class="glow-overlay" />

  <!-- Centered Minimalist Typography -->
  <g class="main-title">
    <!-- Main Title "KAVINMAYIL" -->
    <text x="450" y="85" text-anchor="middle" class="font-orbitron" font-size="38" font-weight="900" fill="url(#goldGrad)" filter="url(#glowGold)" letter-spacing="4">KAVINMAYIL</text>
  </g>

  <!-- Subtitle -->
  <text x="450" y="118" text-anchor="middle" class="font-outfit" font-size="11" font-weight="300" fill="#a0a0ba" letter-spacing="5">AI ENGINEER  •  PYTHON DEVELOPER  •  IOT INNOVATOR</text>

  <!-- Divider Line -->
  <line x1="380" y1="132" x2="520" y2="132" stroke="url(#crimsonGrad)" stroke-width="1" opacity="0.6" />

  <!-- Dynamic Status Telemetry (Bottom Corners) -->
  <!-- Bottom Left: Diagnostics -->
  <g transform="translate(30, 168)" class="font-mono" font-size="9" fill="#60607a">
    <text x="0" y="0">&gt; SYS_CORE: <tspan fill="#a0a0ba">ACTIVE</tspan></text>
    <text x="0" y="12">&gt; COORDS: <tspan fill="#a0a0ba">12.97°N 77.59°E</tspan></text>
  </g>

  <!-- Bottom Right: Status Indicator -->
  <g transform="translate(870, 168)" class="font-mono" font-size="9" fill="#60607a" text-anchor="end">
    <text x="-12" y="5">WORKSPACE ONLINE</text>
    <circle cx="0" cy="2" r="3.5" fill="#FFA751" class="status-dot" />
  </g>

  <!-- Top Right Corners (Cybernetic Details) -->
  <path d="M 25 25 L 15 25 L 15 15" stroke="#FFE259" stroke-width="1" opacity="0.3" fill="none" />
  <path d="M 875 25 L 885 25 L 885 15" stroke="#FFE259" stroke-width="1" opacity="0.3" fill="none" />
  <path d="M 25 175 L 15 175 L 15 165" stroke="#FFE259" stroke-width="1" opacity="0.3" fill="none" />
  <path d="M 875 175 L 885 175 L 885 165" stroke="#FFE259" stroke-width="1" opacity="0.3" fill="none" />
</svg>
